services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flowteam}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - flowteam_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-flowteam}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - flowteam_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    image: ${IMAGE_BACKEND:?set IMAGE_BACKEND}
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_NAME: ${POSTGRES_DB:-flowteam}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?set ALLOWED_HOSTS}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://app.cowrkflow.com}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://app.cowrkflow.com}
      DEBUG: "False"
      RUN_MIGRATIONS: "0"
      RUN_SEED_MESSAGING: "0"
      USE_UVICORN: ${USE_UVICORN:-0}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      PORT: "8000"
    volumes:
      - flowteam_mediadata:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8000/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: ${IMAGE_FRONTEND:?set IMAGE_FRONTEND}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app.cowrkflow.com/api}
      # Internal Docker hostname for server-side fetches (PDF proxy, etc.)
      # Avoids routing through the public internet/Caddy from inside the container.
      INTERNAL_APP_ORIGIN: http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - flowteam_mediadata:/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  flowteam_pgdata:
  flowteam_redisdata:
  flowteam_mediadata:
  caddy_data:
  caddy_config:
