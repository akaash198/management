name: Backend Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: flowteam_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install daphne
      - name: Run tests
        working-directory: flowteam_backend
        env:
          USE_SQLITE: "True"
          DISABLE_REDIS: "True"
        run: |
          python manage.py test

