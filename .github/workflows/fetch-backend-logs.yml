name: Fetch Backend Logs

on:
  workflow_dispatch: {}

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install paramiko pynacl

      - name: Get Django logs
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          python - <<'PY'
          import os, base64, paramiko

          key_raw = (os.environ.get("HETZNER_SSH_KEY") or "").strip()
          if "BEGIN" in key_raw:
              key_raw = key_raw.replace("\\r", "\r").replace("\\n", "\n")
              if not key_raw.endswith("\n"):
                  key_raw += "\n"
              with open("hetzner_key", "w") as f:
                  f.write(key_raw)
          else:
              with open("hetzner_key", "wb") as f:
                  f.write(base64.b64decode(key_raw.replace("\\n","").replace(" ","")))
          os.chmod("hetzner_key", 0o600)

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          client.connect(os.environ["HETZNER_HOST"], username=os.environ["HETZNER_USER"], key_filename="hetzner_key")

          cmds = [
              # Print raw backend container logs
              "CONTAINER=$(docker ps --filter name=backend --format '{{.Names}}' | head -1); docker logs $CONTAINER --tail 100 2>&1",
              # Diagnose 404 - check project and team membership for the failing project
              """CONTAINER=$(docker ps --filter name=backend --format '{{.Names}}' | head -1); docker exec $CONTAINER python -c "
import os, django
os.environ['DJANGO_SETTINGS_MODULE'] = 'config.settings.production'
django.setup()
from apps.projects.models import Project
from apps.teams.models import TeamMember
from django.contrib.auth import get_user_model
User = get_user_model()

project_id = '4a865163-998b-424e-9cf2-f61a0c79b67a'
p = Project.objects.filter(id=project_id).first()
if not p:
    print('PROJECT NOT FOUND IN DB')
else:
    print(f'Project: {p.name}, team_id: {p.team_id}')
    members = TeamMember.objects.filter(team_id=p.team_id).select_related('user')
    print(f'Team members ({members.count()}):')
    for m in members:
        print(f'  {m.user.email} -> {m.role}')
" 2>&1""",
          ]
          for cmd in cmds:
              _, stdout, stderr = client.exec_command(cmd)
              print(stdout.read().decode())
              print(stderr.read().decode())

          client.close()
          PY
