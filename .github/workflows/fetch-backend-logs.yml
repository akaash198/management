name: Fetch Backend Logs

on:
  workflow_dispatch: {}

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install paramiko pynacl

      - name: Get Django logs
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          python - <<'PY'
          import os, base64, paramiko

          key_raw = (os.environ.get("HETZNER_SSH_KEY") or "").strip()
          if "BEGIN" in key_raw:
              key_raw = key_raw.replace("\\r", "\r").replace("\\n", "\n")
              if not key_raw.endswith("\n"):
                  key_raw += "\n"
              with open("hetzner_key", "w") as f:
                  f.write(key_raw)
          else:
              with open("hetzner_key", "wb") as f:
                  f.write(base64.b64decode(key_raw.replace("\\n","").replace(" ","")))
          os.chmod("hetzner_key", 0o600)

          client = paramiko.SSHClient()
          client.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          client.connect(os.environ["HETZNER_HOST"], username=os.environ["HETZNER_USER"], key_filename="hetzner_key")

          cmds = [
              # Force a traceback by hitting the endpoint inside the container with DEBUG detail
              "CONTAINER=$(docker ps --filter name=backend --format '{{.Names}}' | head -1); docker exec $CONTAINER python -c \"\nimport os, traceback\nos.environ['DJANGO_SETTINGS_MODULE'] = 'config.settings.production'\nimport django; django.setup()\nfrom django.test import RequestFactory\nfrom django.contrib.auth import get_user_model\nUser = get_user_model()\nu = User.objects.filter(is_active=True).first()\nprint('User:', u)\nfrom apps.users.views import UserMeView\nfrom rest_framework.test import APIRequestFactory\nfrom rest_framework.request import Request\nfrom rest_framework.parsers import JSONParser\nfactory = APIRequestFactory()\nreq = factory.get('/api/auth/me/', HTTP_AUTHORIZATION='Bearer test')\ntry:\n    resp = UserMeView.as_view()(req)\n    print('Status:', resp.status_code)\nexcept Exception as e:\n    traceback.print_exc()\n\" 2>&1",
              # Also check for migration issues
              "CONTAINER=$(docker ps --filter name=backend --format '{{.Names}}' | head -1); docker exec $CONTAINER python manage.py showmigrations --list 2>&1 | tail -30",
          ]
          for cmd in cmds:
              _, stdout, stderr = client.exec_command(cmd)
              print(stdout.read().decode())
              print(stderr.read().decode())

          client.close()
          PY
