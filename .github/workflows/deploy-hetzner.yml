name: Deploy to Hetzner (SSH + Docker Compose)

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/flowteam
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  REPO_NAME: ${{ github.event.repository.name }}
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install paramiko
        run: |
          python -m pip install --upgrade pip
          pip install paramiko pynacl

      - name: Deploy (Paramiko)
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          python - <<'PY'
          import os
          import base64
          import binascii
          
          key = (os.environ.get("HETZNER_SSH_KEY") or "").strip()
          if not key:
              raise SystemExit("Missing HETZNER_SSH_KEY secret (must be an SSH *private* key).")
          if key.startswith("ssh-"):
              raise SystemExit(
                  "HETZNER_SSH_KEY looks like an SSH *public* key (starts with 'ssh-'). "
                  "Set this secret to the matching *private* key (OpenSSH format) instead."
              )
          if "BEGIN" in key:
              # Handle secrets stored with literal "\n" sequences.
              key = key.replace("\\r", "\r").replace("\\n", "\n")
              if not key.endswith("\n"):
                  key += "\n"
              with open("hetzner_key", "w", encoding="utf-8") as f:
                  f.write(key)
          else:
              # Handle base64-wrapped secrets.
              key = key.replace("\\n", "").replace("\\r", "").replace(" ", "")
              with open("hetzner_key", "wb") as f:
                  try:
                      f.write(base64.b64decode(key, validate=True))
                  except (binascii.Error, ValueError) as exc:
                      raise SystemExit(
                          "HETZNER_SSH_KEY is neither a raw private key (contains 'BEGIN') nor valid base64. "
                          "If you pasted a public key by mistake, it will start with 'ssh-ed25519' or 'ssh-rsa'."
                      ) from exc
          PY
          chmod 600 hetzner_key

          # Optional guardrail: if the repo contains a canonical deploy public key,
          # verify the provided private key matches it. This catches "wrong key in secret"
          # problems early with a clearer error than Paramiko's generic auth failure.
          if [ -f "deploy/keys/hetzner_deploy_ed25519.pub" ]; then
            EXPECTED_PUB="$(tr -d '\r' < deploy/keys/hetzner_deploy_ed25519.pub | sed -e 's/[[:space:]]\+$//')"
            ACTUAL_PUB="$(ssh-keygen -y -f hetzner_key 2>/dev/null | tr -d '\r' | sed -e 's/[[:space:]]\+$//')"
            if [ -z "$ACTUAL_PUB" ]; then
              echo "Unable to derive public key from HETZNER_SSH_KEY (is it encrypted or invalid?)" >&2
              exit 1
            fi
            if [ "$EXPECTED_PUB" != "$ACTUAL_PUB" ]; then
              echo "HETZNER_SSH_KEY does not match deploy/keys/hetzner_deploy_ed25519.pub" >&2
              echo "Expected: $(echo "$EXPECTED_PUB" | cut -d' ' -f1-2) ..." >&2
              echo "Actual:   $(echo "$ACTUAL_PUB" | cut -d' ' -f1-2) ..." >&2
              echo "Fix: update the GitHub secret HETZNER_SSH_KEY to the matching private key, or update the repo .pub file." >&2
              exit 1
            fi
          fi

          python scripts/deploy_hetzner_paramiko.py \
            --host "${HETZNER_HOST}" \
            --user "${HETZNER_USER}" \
            --ssh-key-file hetzner_key \
            --deploy-path "${{ env.DEPLOY_PATH }}" \
            --server-ip "${HETZNER_HOST}" \
            --upload \
            --write-env-prod \
            --bootstrap-ufw \
            --ghcr-username "${GHCR_USERNAME}" \
            --ghcr-token "${GHCR_TOKEN}" \
            --registry "${{ env.REGISTRY }}" \
            --image-backend "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}-backend:${{ env.DEPLOY_SHA }}" \
            --image-frontend "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME }}-frontend:${{ env.DEPLOY_SHA }}" \
            --deploy-sha "${{ env.DEPLOY_SHA }}" \
            --deploy
