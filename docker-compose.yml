services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowteam
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - flowteam_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowteam"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - flowteam_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./flowteam_backend
      dockerfile: Dockerfile
    environment:
      - DB_NAME=flowteam
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,192.168.1.142
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-for-docker-env
      - RUN_MIGRATIONS=1
      - RUN_SEED_MESSAGING=0
    ports:
      - "8000:8000"
    volumes:
      - ./flowteam_backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./flowteam_frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./flowteam_frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  flowteam_pgdata:
  flowteam_redisdata:
